services:
  - type: web
    name: smart-mart
    runtime: python
    healthCheckPath: /health
    buildCommand: bash build.sh && flask --app run.py db upgrade
    # Workers auto-scale: 2 workers × 4 threads when REDIS_URL is set (shared rate-limit + cache)
    # Without Redis: 1 worker × 8 threads (safe, no shared-state needed)
    startCommand: bash -c 'if [ -n "$REDIS_URL" ]; then exec gunicorn "smart_mart.app:create_app(\"production\")" --bind 0.0.0.0:$PORT --workers 2 --threads 4 --worker-class gthread --timeout 120 --keep-alive 5 --max-requests 1000 --max-requests-jitter 100 --access-logfile -; else exec gunicorn "smart_mart.app:create_app(\"production\")" --bind 0.0.0.0:$PORT --workers 1 --threads 8 --worker-class gthread --timeout 120 --keep-alive 5 --max-requests 1000 --max-requests-jitter 100 --access-logfile -; fi'
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: BOT_SECRET
        generateValue: true
      - key: LOG_LEVEL
        value: INFO

      # REQUIRED: Set this to your PostgreSQL connection string.
      - key: DATABASE_URL
        sync: false

      # REQUIRED: Set a strong password for the admin account.
      - key: ADMIN_PASSWORD
        sync: false

      # REQUIRED for AI-powered features (chatbot, autofill, insights).
      - key: ANTHROPIC_API_KEY
        sync: false

      # ── eSewa Payment Gateway ────────────────────────────────────────────
      # Sandbox default is EPAYTEST. Set to your live merchant code for production.
      - key: ESEWA_PRODUCT_CODE
        value: EPAYTEST
      - key: ESEWA_SECRET_KEY
        sync: false   # Set to your eSewa merchant secret key

      # ── Khalti Payment Gateway ───────────────────────────────────────────
      - key: KHALTI_SECRET_KEY
        sync: false   # Set to your Khalti live secret key

      # ── Email (order confirmations, password reset) ──────────────────────
      - key: MAIL_SERVER
        sync: false   # e.g. smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USE_TLS
        value: "true"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false   # e.g. "GoldKernel <noreply@yourdomain.com>"

      # ── Notifications (SMS) ──────────────────────────────────────────────
      - key: NOTIFICATION_PROVIDER
        value: none   # Change to "sparrow" or "twilio" with credentials set
      - key: SPARROW_TOKEN
        sync: false

      # ── Cloudinary (persistent image storage) ───────────────────────────
      # Without this, uploaded images are lost on each Render redeploy.
      - key: CLOUDINARY_URL
        sync: false

      # ── Redis (shared rate-limiting + caching across workers) ─────────────
      # Linked automatically when a Redis service is added to this blueprint.
      - key: REDIS_URL
        fromService:
          name: smart-mart-redis
          type: redis
          property: connectionString
        optional: true

      # ── App URL (used by the daily cron bot) ────────────────────────────
      - key: APP_URL
        sync: false   # e.g. https://smart-mart.onrender.com

      # Optional: override the admin username (default: admin)
      - key: ADMIN_USERNAME
        value: admin

  # Daily bot — runs at 8:00 AM Nepal time (2:15 AM UTC = UTC+5:45)
  - type: cron
    name: smart-mart-daily-bot
    runtime: python
    schedule: "15 2 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: >
      python -c "
      import os, urllib.request, urllib.parse
      url = os.environ['APP_URL'].rstrip('/') + '/api/bot/run'
      secret = os.environ.get('BOT_SECRET', '')
      req = urllib.request.Request(url, data=b'', method='POST')
      req.add_header('X-Bot-Secret', secret)
      req.add_header('Content-Type', 'application/json')
      with urllib.request.urlopen(req, timeout=60) as r:
          print(r.read().decode())
      "
    envVars:
      - key: APP_URL
        sync: false   # Set to your Render web service URL e.g. https://smart-mart.onrender.com
      - key: BOT_SECRET
        sync: false   # Must match the BOT_SECRET on the web service

  # Redis — shared rate-limiting + caching across Gunicorn workers
  # Free tier: 25 MB, persistent. Upgrade as traffic grows.
  - type: redis
    name: smart-mart-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
