services:
  - type: web
    name: smart-mart
    runtime: python
    buildCommand: pip install -r requirements.txt && bash build.sh
    startCommand: gunicorn "smart_mart.app:create_app('production')" --bind 0.0.0.0:$PORT --workers 2 --threads 2 --worker-class gthread --timeout 120 --keep-alive 5 --max-requests 1000 --max-requests-jitter 100 --access-logfile -
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: BOT_SECRET
        generateValue: true
      - key: LOG_LEVEL
        value: INFO
      # REQUIRED: Set this to your PostgreSQL connection string.
      - key: DATABASE_URL
        sync: false
      # REQUIRED: Set a strong password for the admin account.
      - key: ADMIN_PASSWORD
        sync: false
      # Optional: override the admin username (default: admin)
      - key: ADMIN_USERNAME
        value: admin

  # Daily bot — runs at 8:00 AM Nepal time (2:15 AM UTC = UTC+5:45)
  # Sends low-stock alerts, credit reminders, expiry warnings, expense reminders, daily summary
  - type: cron
    name: smart-mart-daily-bot
    runtime: python
    schedule: "15 2 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: >
      python -c "
      import os, urllib.request, urllib.parse
      url = os.environ['APP_URL'].rstrip('/') + '/api/bot/run'
      secret = os.environ.get('BOT_SECRET', '')
      req = urllib.request.Request(url, data=b'', method='POST')
      req.add_header('X-Bot-Secret', secret)
      req.add_header('Content-Type', 'application/json')
      with urllib.request.urlopen(req, timeout=60) as r:
          print(r.read().decode())
      "
    envVars:
      - key: APP_URL
        sync: false   # Set to your Render web service URL e.g. https://smart-mart.onrender.com
      - key: BOT_SECRET
        sync: false   # Must match the BOT_SECRET on the web service
