services:
  - type: web
    name: smart-mart
    runtime: python
    buildCommand: pip install -r requirements.txt && bash build.sh
    startCommand: gunicorn "smart_mart.app:create_app('production')" --bind 0.0.0.0:$PORT --workers 2 --threads 2 --worker-class gthread --timeout 120 --keep-alive 5 --max-requests 1000 --max-requests-jitter 100 --access-logfile -
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: BOT_SECRET
        generateValue: true
      - key: LOG_LEVEL
        value: INFO
      # REQUIRED: Set this to your PostgreSQL connection string.
      # On Render: create a PostgreSQL database, then copy its Internal Database URL here.
      # Without this, the app will NOT start (SQLite is not used in production).
      - key: DATABASE_URL
        sync: false
      # REQUIRED: Set a strong password for the admin account.
      # The build will fail if this is not set.
      - key: ADMIN_PASSWORD
        sync: false
      # Optional: override the admin username (default: admin)
      - key: ADMIN_USERNAME
        value: admin
