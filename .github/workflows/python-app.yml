# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements-dev.txt
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Audit dependencies for known CVEs (pip-audit)
      run: |
        pip-audit -r requirements.txt
    - name: Static security scan (bandit)
      # Informational for now: flags real findings but doesn't fail the build,
      # since the existing low-severity backlog hasn't been triaged yet.
      # Tighten this (drop --exit-zero, or add -ll to fail on medium+) once
      # the backlog is reviewed.
      run: |
        bandit -r smart_mart -ll --exit-zero
    - name: Test with pytest
      env:
        HYPOTHESIS_PROFILE: ci
      run: |
        python -m pytest
