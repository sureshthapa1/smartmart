[pytest]
python_files = test_*.py
# Mark slow property-based tests so normal dev runs can skip them:
#   pytest -m "not slow"          — fast unit tests only (~30s)
#   pytest                        — all tests including property tests
#   pytest -m slow                — property tests only
markers =
    slow: marks tests as slow (property-based / Hypothesis tests)
    smoke: marks tests as smoke tests (fast route checks)
    unit: marks tests as unit tests

# Default: run all tests
# For CI fast mode: pytest -m "not slow"
addopts = -v --tb=short
testpaths = tests

# Suppress the SECRET_KEY dev-fallback warning during test collection.
# The warning is intentional for dev/staging but is noise in CI since
# SECRET_KEY is never set in test environments.
filterwarnings =
    ignore::UserWarning:smart_mart.config
