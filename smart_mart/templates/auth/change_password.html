{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block page_title %}Change Password{% endblock %}
{% block breadcrumb %}<li class="breadcrumb-item active">Change Password</li>{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-4">
    <div class="card">
      <div class="card-header"><i class="bi bi-key me-2 text-primary"></i>Change Your Password</div>
      <div class="card-body p-4">
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Current Password <span class="text-danger">*</span></label>
            <input type="password" name="current_password" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">New Password <span class="text-danger">*</span></label>
            <input type="password" name="new_password" class="form-control" required minlength="6">
            <div class="form-text">Minimum 6 characters.</div>
          </div>
          <div class="mb-4">
            <label class="form-label">Confirm New Password <span class="text-danger">*</span></label>
            <input type="password" name="confirm_password" class="form-control" required>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4">
              <i class="bi bi-check-lg me-1"></i>Update Password
            </button>
            <a href="{{ url_for('dashboard.index') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
