<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set New Password — Smart Mart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    body{background:linear-gradient(135deg,#1e1b4b 0%,#312e81 40%,#4c1d95 100%);min-height:100vh;font-family:'Inter','Segoe UI',system-ui,sans-serif}
    .wrap{max-width:420px;width:100%}
    .brand-logo{width:56px;height:56px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:#fff;margin:0 auto 1rem;box-shadow:0 8px 24px rgba(99,102,241,.5)}
    .card{border:none!important;border-radius:20px!important;box-shadow:0 24px 64px rgba(0,0,0,.3)!important}
    .card-body{padding:2rem 2.25rem}
    .form-control{border-radius:10px;border-color:#e2e8f0;font-size:.9rem;padding:.6rem .9rem}
    .form-control:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.15)}
    .btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:10px;padding:.65rem;font-weight:600}
  </style>
</head>
<body class="d-flex align-items-center justify-content-center p-3">
  <div class="wrap">
    <div class="text-center mb-4">
      <div class="brand-logo"><i class="bi bi-shield-lock"></i></div>
      <h5 class="fw-bold text-white mb-1">Set New Password</h5>
      <p class="small mb-0" style="color:rgba(255,255,255,.5)">Smart Mart</p>
    </div>
    <div class="card">
      <div class="card-body">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} py-2 mb-3" style="border-radius:10px;border:none;font-size:.875rem">{{ message }}</div>
          {% endfor %}
        {% endwith %}
        <p class="text-muted small mb-3">
          Enter a new password (minimum 8 characters).
        </p>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold" style="font-size:.82rem;color:#374151">New Password</label>
            <input type="password" name="new_password" class="form-control" placeholder="At least 8 characters" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold" style="font-size:.82rem;color:#374151">Confirm Password</label>
            <input type="password" name="confirm_password" class="form-control" placeholder="Re-enter password" required>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary text-white">
              <i class="bi bi-check-circle me-2"></i>Reset Password
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
