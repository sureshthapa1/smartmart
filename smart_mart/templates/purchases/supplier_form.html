<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ 'Edit' if supplier else 'New' }} Supplier — Smart Mart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>body{background:#f8fafc;}</style>
</head>
<body>
  <nav class="navbar navbar-dark px-3 py-2" style="background:#0f172a;">
    <a href="{{ url_for('dashboard.index') }}" class="btn btn-sm me-3" style="background:#1e293b;color:#94a3b8;border:none;">
      <i class="bi bi-house-door me-1"></i>Dashboard
    </a>
    <span class="navbar-brand fw-bold mb-0"><i class="bi bi-shop me-2" style="color:#6366f1;"></i>Smart Mart</span>
    <a href="{{ url_for('purchases.list_suppliers') }}" class="btn btn-sm" style="background:#1e293b;color:#94a3b8;border:none;">
      <i class="bi bi-arrow-left me-1"></i>Suppliers
    </a>
  </nav>

  <div class="container mt-4" style="max-width:600px;">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show">{{ message }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
      {% endfor %}
    {% endwith %}

    <div class="card shadow-sm border-0 rounded-3">
      <div class="card-header bg-white border-bottom py-3 px-4">
        <h5 class="fw-bold mb-0"><i class="bi bi-building me-2 text-primary"></i>{{ 'Edit' if supplier else 'New' }} Supplier</h5>
      </div>
      <div class="card-body p-4">
        <form method="post" action="{{ url_for('purchases.edit_supplier', supplier_id=supplier.id) if supplier else url_for('purchases.create_supplier') }}">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label fw-medium">Supplier Name <span class="text-danger">*</span></label>
              <input type="text" name="name" class="form-control" value="{{ supplier.name if supplier else '' }}" required autofocus>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-medium">Phone / Contact</label>
              <input type="text" name="contact" class="form-control" value="{{ supplier.contact if supplier else '' }}" placeholder="e.g. 9800000000">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-medium">Email</label>
              <input type="email" name="email" class="form-control" value="{{ supplier.email if supplier else '' }}" placeholder="supplier@example.com">
            </div>
            <div class="col-12">
              <label class="form-label fw-medium">Address</label>
              <textarea name="address" class="form-control" rows="2" placeholder="Street, City, District">{{ supplier.address if supplier else '' }}</textarea>
            </div>
          </div>
          <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4"><i class="bi bi-check-lg me-1"></i>Save Supplier</button>
            <a href="{{ url_for('purchases.list_suppliers') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
