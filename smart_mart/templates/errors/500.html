<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>500 — Smart Mart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body{background:linear-gradient(135deg,#1e1b4b,#312e81,#4c1d95);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Inter',system-ui,sans-serif}
    .err-card{background:rgba(255,255,255,.07);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:3rem 2.5rem;text-align:center;max-width:460px;width:100%;margin:1rem}
    .err-code{font-size:5rem;font-weight:800;line-height:1;background:linear-gradient(135deg,#a5b4fc,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .err-title{color:#e2e8f0;font-size:1.35rem;font-weight:700;margin:.5rem 0}
    .err-sub{color:#94a3b8;font-size:.92rem;margin-bottom:2rem}
    .btn-home{background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;color:#fff;padding:.65rem 1.5rem;border-radius:12px;font-weight:600;font-size:.9rem;text-decoration:none;display:inline-flex;align-items:center;gap:.5rem;transition:all .2s}
    .btn-home:hover{opacity:.85;transform:translateY(-2px);color:#fff}
    .btn-back{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#e2e8f0;padding:.65rem 1.5rem;border-radius:12px;font-weight:600;font-size:.9rem;text-decoration:none;display:inline-flex;align-items:center;gap:.5rem;transition:all .2s}
    .btn-back:hover{background:rgba(255,255,255,.18);color:#fff}
  </style>
</head>
<body>
  <div class="err-card">
    <div style="font-size:3.5rem;margin-bottom:.5rem">⚠️</div>
    <div class="err-code">500</div>
    <div class="err-title">Something Went Wrong</div>
    <div class="err-sub">An unexpected error occurred. Our team has been notified. Please try again in a moment.</div>
    <div class="d-flex gap-2 justify-content-center flex-wrap">
      <a href="javascript:history.back()" class="btn-back"><i class="bi bi-arrow-left"></i>Go Back</a>
      <a href="/dashboard/" class="btn-home"><i class="bi bi-house-fill"></i>Dashboard</a>
    </div>
  </div>
</body></html>
