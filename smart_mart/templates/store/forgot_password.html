{% extends "store/base_store.html" %}
{% block title %}Reset Password — {{ settings.shop_name if settings else 'GoldKernel' }}{% endblock %}
{% block content %}
<div class="sc" style="max-width:400px;margin:0 auto;padding-top:2rem;padding-bottom:3rem;">
  <div class="ucard fu" style="overflow:hidden;">
    <div style="padding:1.75rem 1.75rem 1.5rem;background:var(--brand-grad);text-align:center;">
      <div style="font-size:2rem;margin-bottom:.4rem;">🔑</div>
      <h2 style="color:#fff;font-size:1.1rem;font-weight:900;margin:0 0 .2rem;">Reset Password</h2>
      <p style="color:rgba(255,255,255,.78);font-size:.8rem;margin:0;">We'll send a temporary password to your phone</p>
    </div>
    <div style="padding:1.75rem;">
      <form method="post" action="{{ url_for('store.forgot_password') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div style="margin-bottom:1.25rem;">
          <label class="flabel" for="fp-phone">Registered Phone Number</label>
          <div class="fwrap"><i class="bi bi-telephone fico"></i>
          <input id="fp-phone" type="tel" name="phone" class="finput has-ico" placeholder="98XXXXXXXX" required maxlength="15" autofocus autocomplete="tel">
          </div>
        </div>
        <button type="submit" class="btn-brand w-100 justify-content-center" style="padding:.7rem;"><i class="bi bi-phone"></i> Send Reset Code</button>
      </form>
      <div style="text-align:center;margin-top:1.1rem;font-size:.82rem;"><a href="{{ url_for('store.login') }}" style="color:var(--brand);text-decoration:none;font-weight:600;">← Back to Sign In</a></div>
    </div>
  </div>
</div>
{% endblock %}
