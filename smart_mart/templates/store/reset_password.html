{% extends "store/base_store.html" %}
{% block title %}Reset Password — {{ settings.shop_name if settings else 'Goldkernel Dryfruits and Treats' }}{% endblock %}
{% block content %}
<div style="min-height:75vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;">
  <div style="width:100%;max-width:420px;" class="fade-up">
    <div class="ui-card" style="overflow:hidden;box-shadow:var(--shadow-lg);">
      <div style="background:var(--brand-grad);padding:1.75rem;text-align:center;color:#fff;">
        <div style="font-size:2.2rem;margin-bottom:.5rem;">🔐</div>
        <h2 style="font-size:1.2rem;font-weight:900;margin:0 0 .2rem;">Set New Password</h2>
        <p style="color:rgba(255,255,255,.82);font-size:.82rem;margin:0;">For account: <strong>{{ phone }}</strong></p>
      </div>
      <div style="padding:1.75rem;">
        <form method="post" action="{{ url_for('store.reset_password', phone=phone, token=token) }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

          <div style="margin-bottom:.9rem;">
            <label class="field-label" for="rp-pw1">New Password <span style="font-weight:400;">(min 6 chars)</span></label>
            <div class="field-wrap">
              <i class="bi bi-lock field-icon"></i>
              <input id="rp-pw1" type="password" name="new_password" placeholder="Create a strong password"
                     required maxlength="128" autocomplete="new-password" autofocus
                     class="field-input has-icon" style="padding-right:2.6rem;">
              <button type="button" onclick="togglePw('rp-pw1','eye1')" tabindex="-1"
                      style="position:absolute;right:.8rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted-2);cursor:pointer;font-size:.85rem;padding:0;line-height:1;">
                <i class="bi bi-eye" id="eye1"></i>
              </button>
            </div>
          </div>

          <div style="margin-bottom:1.5rem;">
            <label class="field-label" for="rp-pw2">Confirm Password</label>
            <div class="field-wrap">
              <i class="bi bi-lock-fill field-icon"></i>
              <input id="rp-pw2" type="password" name="confirm_password" placeholder="Repeat new password"
                     required maxlength="128" autocomplete="new-password"
                     class="field-input has-icon" style="padding-right:2.6rem;">
              <button type="button" onclick="togglePw('rp-pw2','eye2')" tabindex="-1"
                      style="position:absolute;right:.8rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted-2);cursor:pointer;font-size:.85rem;padding:0;line-height:1;">
                <i class="bi bi-eye" id="eye2"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn-brand w-100 justify-content-center" style="padding:.75rem;font-size:.95rem;">
            <i class="bi bi-check-lg"></i> Reset Password
          </button>
        </form>

        <div style="text-align:center;margin-top:1rem;">
          <a href="{{ url_for('store.login') }}" class="btn-ghost" style="font-size:.82rem;padding:.35rem .85rem;">
            <i class="bi bi-arrow-left"></i> Back to Login
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function togglePw(id, eyeId) {
  const inp = document.getElementById(id);
  const eye = document.getElementById(eyeId);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  eye.className = inp.type === 'text' ? 'bi bi-eye-slash' : 'bi bi-eye';
}
</script>
{% endblock %}
