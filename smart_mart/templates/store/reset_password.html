{% extends "store/base_store.html" %}
{% block title %}Reset Password — {{ settings.shop_name if settings else 'GoldKernel' }}{% endblock %}
{% block content %}
<div style="min-height:70vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;">
  <div style="width:100%;max-width:420px;" class="fade-up">
    <div style="background:#fff;border-radius:var(--radius);border:1.5px solid var(--border);overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.08);">
      <div style="background:linear-gradient(135deg,#1c1917,#292524);padding:1.75rem;text-align:center;color:#fff;">
        <div style="font-size:2.2rem;margin-bottom:.5rem;">🔐</div>
        <h2 style="font-size:1.2rem;font-weight:900;margin:0 0 .2rem;">Set New Password</h2>
        <p style="color:#a8a29e;font-size:.82rem;margin:0;">For account: <strong>{{ phone }}</strong></p>
      </div>
      <div style="padding:1.75rem;">
        <form method="post" action="{{ url_for('store.reset_password', phone=phone, token=token) }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div style="margin-bottom:.9rem;">
            <label for="rp-pw1" style="display:block;font-size:.8rem;font-weight:700;color:var(--muted);margin-bottom:.4rem;">New Password</label>
            <div style="position:relative;">
              <i class="bi bi-lock" style="position:absolute;left:.85rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.9rem;pointer-events:none;"></i>
              <input id="rp-pw1" type="password" name="new_password" placeholder="At least 6 characters" required
                     maxlength="128" autocomplete="new-password" autofocus
                     style="width:100%;padding:.6rem 2.4rem .6rem 2.4rem;border:1.5px solid var(--border);border-radius:10px;font-size:.9rem;outline:none;"
                     onfocus="this.style.borderColor='var(--brand)'" onblur="this.style.borderColor='var(--border)'">
              <button type="button" onclick="togglePw('rp-pw1','eye1')" tabindex="-1"
                      style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;padding:0;font-size:.9rem;">
                <i class="bi bi-eye" id="eye1"></i>
              </button>
            </div>
          </div>
          <div style="margin-bottom:1.25rem;">
            <label for="rp-pw2" style="display:block;font-size:.8rem;font-weight:700;color:var(--muted);margin-bottom:.4rem;">Confirm Password</label>
            <div style="position:relative;">
              <i class="bi bi-lock-fill" style="position:absolute;left:.85rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.9rem;pointer-events:none;"></i>
              <input id="rp-pw2" type="password" name="confirm_password" placeholder="Repeat new password" required
                     maxlength="128" autocomplete="new-password"
                     style="width:100%;padding:.6rem 2.4rem .6rem 2.4rem;border:1.5px solid var(--border);border-radius:10px;font-size:.9rem;outline:none;"
                     onfocus="this.style.borderColor='var(--brand)'" onblur="this.style.borderColor='var(--border)'">
              <button type="button" onclick="togglePw('rp-pw2','eye2')" tabindex="-1"
                      style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;padding:0;font-size:.9rem;">
                <i class="bi bi-eye" id="eye2"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="btn-brand w-100 justify-content-center" style="padding:.7rem;font-size:.95rem;">
            <i class="bi bi-check-lg"></i> Reset Password
          </button>
        </form>
        <div style="text-align:center;margin-top:1rem;">
          <a href="{{ url_for('store.login') }}" style="font-size:.85rem;color:var(--muted);text-decoration:none;">
            <i class="bi bi-arrow-left me-1"></i>Back to Login
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function togglePw(id, eyeId) {
  const input = document.getElementById(id);
  const eye = document.getElementById(eyeId);
  if (input.type === 'password') { input.type = 'text'; eye.className = 'bi bi-eye-slash'; }
  else { input.type = 'password'; eye.className = 'bi bi-eye'; }
}
</script>
{% endblock %}
