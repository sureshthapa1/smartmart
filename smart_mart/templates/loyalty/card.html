<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loyalty Card - {{ customer.name }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{background:#f1f5f9;font-family:Inter,system-ui,sans-serif}
    .card-shell{max-width:520px;margin:48px auto;border-radius:14px;overflow:hidden;border:1px solid #C9991A;background:#fff;box-shadow:0 16px 44px rgba(0,0,0,.12)}
    .brand{background:#1A5C3A;color:#fff;padding:24px;border-bottom:5px solid #C9991A}
    .tier{letter-spacing:.08em;text-transform:uppercase}
  </style>
</head>
<body>
  <div class="card-shell">
    <div class="brand">
      <div class="fw-bold fs-4">{{ shop.name or shop.shop_name }}</div>
      <div class="small opacity-75">{{ shop.address or 'Dhangadhi, Nepal' }}</div>
    </div>
    <div class="p-4">
      <div class="d-flex justify-content-between gap-3">
        <div>
          <div class="text-muted small">Customer</div>
          <h3 class="fw-bold mb-2">{{ customer.name }}</h3>
          <span class="badge tier {% if customer.loyalty_tier == 'platinum' %}bg-dark{% elif customer.loyalty_tier == 'gold' %}bg-warning text-dark{% else %}bg-secondary{% endif %}">{{ (customer.loyalty_tier or 'silver')|title }}</span>
        </div>
        <img src="{{ qr_image_b64 }}" alt="QR" width="116" height="116">
      </div>
      <div class="row g-3 mt-3">
        <div class="col-6"><div class="text-muted small">Points</div><div class="fs-3 fw-bold" style="color:#C9991A">{{ customer.loyalty_points or 0 }}</div></div>
        <div class="col-6 text-end"><div class="text-muted small">Total Spent</div><div class="fs-5 fw-bold">NPR {{ "%.2f"|format((customer.total_spent or 0)|float) }}</div></div>
      </div>
      <div class="d-flex gap-2 mt-4">
        <a href="{{ url_for('loyalty.card_pdf', customer_id=customer.id) }}" class="btn btn-success">Download PDF</a>
        <a href="{{ url_for('loyalty.index') }}" class="btn btn-outline-secondary">Back</a>
      </div>
    </div>
  </div>
</body>
</html>
