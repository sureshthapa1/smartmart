<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ 'Edit' if category else 'New' }} Category — Smart Mart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>body{background:#f8fafc;}</style>
</head>
<body>
  <nav class="navbar navbar-dark px-3" style="background:#0f172a;">
    <a href="{{ url_for('dashboard.index') }}" class="btn btn-outline-light btn-sm me-2"><i class="bi bi-house"></i> Dashboard</a>
    <span class="navbar-brand fw-bold mb-0">Smart Mart</span>
    <a href="{{ url_for('inventory.list_categories') }}" class="btn btn-outline-light btn-sm">← Categories</a>
  </nav>
  <div class="container mt-4" style="max-width:480px;">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, message in messages %}
        <div class="alert alert-{{ cat }} alert-dismissible fade show">{{ message }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
      {% endfor %}
    {% endwith %}
    <div class="card shadow-sm border-0 rounded-3">
      <div class="card-body p-4">
        <h5 class="fw-bold mb-4">{{ 'Edit' if category else 'New' }} Category</h5>
        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-medium">Category Name <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control" value="{{ category.name if category else '' }}" required autofocus>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{{ url_for('inventory.list_categories') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
