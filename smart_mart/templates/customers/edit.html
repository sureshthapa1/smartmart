{% extends "base.html" %}
{% block title %}Edit {{ customer.name }}{% endblock %}
{% block page_title %}Edit Customer{% endblock %}
{% block breadcrumb %}
<li class="breadcrumb-item"><a href="{{ url_for('customers.list_customers') }}" class="text-decoration-none">Customers</a></li>
<li class="breadcrumb-item"><a href="{{ url_for('customers.customer_profile', customer_id=customer.id) }}" class="text-decoration-none">{{ customer.name }}</a></li>
<li class="breadcrumb-item active">Edit</li>
{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card">
      <div class="card-header"><i class="bi bi-person-gear me-2 text-primary"></i>Edit Customer</div>
      <div class="card-body p-4">
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Name <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control" required value="{{ customer.name }}">
          </div>
          <div class="mb-3">
            <label class="form-label">Phone</label>
            <input type="text" name="phone" class="form-control" value="{{ customer.phone or '' }}" placeholder="98XXXXXXXX">
          </div>
          <div class="mb-4">
            <label class="form-label">Address</label>
            <input type="text" name="address" class="form-control" value="{{ customer.address or '' }}" placeholder="City / District">
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4"><i class="bi bi-check-lg me-1"></i>Save</button>
            <a href="{{ url_for('customers.customer_profile', customer_id=customer.id) }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
